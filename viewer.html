<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebäudekarte - Interaktive Karte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", system-ui, -apple-system, Arial, Helvetica, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #d6d3c8;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #ffffff;
            color: #1a1a1a;
            overflow-y: auto;
            border-right: 1px solid #c0bda8;
            border-left: 3px solid #4b5320;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #c0bda8;
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #2d331a;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #888;
        }

        .group {
            border-bottom: 1px solid #e8e6df;
        }

        .group-header {
            padding: 12px 20px;
            background: #f5f4ee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .group-header:hover {
            background: #e8e6df;
        }

        .group-header h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4b5320;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .group-toggle {
            font-size: 12px;
            color: #b0ad98;
            transition: transform 0.3s;
        }

        .group.collapsed .group-toggle {
            transform: rotate(-90deg);
        }

        .group-buildings {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .group.collapsed .group-buildings {
            max-height: 0;
        }

        .building-item {
            padding: 10px 20px 10px 35px;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .building-item:hover {
            background: #f5f4ee;
            border-left-color: #6b7530;
        }

        .building-item.highlighted {
            background: #e8e6df;
            border-left-color: #f39c12;
        }

        .building-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .building-id {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }

        /* Main content */
        .main-content {
            flex: 1;
            overflow: auto;
            background: #d6d3c8;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .image-container img {
            display: block;
            width: 100%;
            height: auto;
        }

        .svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .building-polygon {
            fill: rgba(255, 255, 0, 0);
            stroke: rgba(255, 255, 0, 0);
            stroke-width: 2;
            pointer-events: auto;
            cursor: pointer;
            transition: fill 0.2s, stroke 0.2s;
        }

        .building-polygon:hover {
            /* Hover styles are applied via JavaScript using custom colors */
        }

        /* Selection Circle */
        .selection-circle {
            fill: none;
            stroke: #4b5320;
            stroke-width: 4;
            pointer-events: none;
        }

        /* Dim overlay */
        .dim-overlay {
            fill: rgba(0, 0, 0, 0.6);
            pointer-events: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
        }

        .modal-overlay.active {
            display: block;
        }

        .modal-content {
            position: absolute;
            background: #ffffff;
            border-radius: 2px;
            border: 1px solid #c0bda8;
            border-left: 3px solid #4b5320;
            padding: 25px 30px;
            min-width: 280px;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #b0ad98;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }

        .modal-close:hover {
            background: #e8e6df;
            color: #2d331a;
        }

        .modal-content h2 {
            margin: 0;
            color: #2d331a;
            font-size: 22px;
            padding-right: 25px;
        }

        .modal-breadcrumb {
            font-size: 12px;
            color: #6b7530;
            margin: 4px 0 0 0;
        }

        .modal-breadcrumb span::after {
            content: ' \203A ';
            margin: 0 2px;
        }

        .modal-breadcrumb span:last-child::after {
            content: '';
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-beschreibung {
            color: #1a1a1a;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: #b0ad98;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 id="sidebar-title">Gebäudekarte</h1>
                <p>Interaktive Karte</p>
            </div>
            <div id="sidebar-content" class="loading">
                Lade Gebäudedaten...
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="image-container-wrapper" class="loading">
                Lade Karte...
            </div>
        </main>
    </div>

    <script>
        // Global state
        let buildingsData = null;
        let currentHighlighted = new Set();

        // Load and initialize
        async function init() {
            try {
                // Load building data: prefer in-memory, then sessionStorage, then fetch
                if (window.__buildingsData) {
                    buildingsData = window.__buildingsData;
                } else if (sessionStorage.getItem('buildingsData')) {
                    buildingsData = JSON.parse(sessionStorage.getItem('buildingsData'));
                } else if (localStorage.getItem('editor_buildingsData')) {
                    buildingsData = JSON.parse(localStorage.getItem('editor_buildingsData'));
                } else if (localStorage.getItem('pipeline_result_cache')) {
                    const cached = JSON.parse(localStorage.getItem('pipeline_result_cache'));
                    if (cached.buildingJson) buildingsData = cached.buildingJson;
                    else throw new Error('Keine Gebäudedaten im Cache gefunden');
                } else {
                    const response = await fetch('gebaeude_polygone.json');
                    if (!response.ok) {
                        throw new Error('Konnte gebaeude_polygone.json nicht laden');
                    }
                    buildingsData = await response.json();
                }

                // Set dynamic title
                const title = buildingsData.title || 'Gebäudekarte';
                document.getElementById('sidebar-title').textContent = title;
                document.title = title + ' - Interaktive Karte';

                // Render everything
                renderImage();
                renderSidebar();

            } catch (error) {
                document.getElementById('sidebar-content').innerHTML =
                    '<div class="error">Fehler beim Laden der Daten: ' + error.message + '</div>';
                document.getElementById('image-container-wrapper').innerHTML =
                    '<div class="error">Fehler beim Laden der Karte</div>';
                console.error('Initialization error:', error);
            }
        }

        // Render the image with SVG overlays
        function renderImage() {
            const wrapper = document.getElementById('image-container-wrapper');
            const { filename, width, height } = buildingsData.image;

            // Create container
            const container = document.createElement('div');
            container.className = 'image-container';

            // Add image
            const img = document.createElement('img');
            img.src = buildingsData.image.dataUrl || filename;
            img.alt = (buildingsData.title || 'Gebäudekarte') + ' Karte';
            container.appendChild(img);

            // Create SVG overlay
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'svg-overlay');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

            // Add polygons
            buildingsData.buildings.forEach(building => {
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');

                // Convert normalized coordinates to pixel coordinates (to match viewBox)
                const points = building.polygon.map(([x, y]) =>
                    `${x * width},${y * height}`
                ).join(' ');

                polygon.setAttribute('points', points);
                polygon.setAttribute('class', 'building-polygon');
                polygon.setAttribute('data-building-id', building.id);

                // Event listeners
                polygon.addEventListener('mouseenter', () => highlightBuilding(building.id));
                polygon.addEventListener('mouseleave', () => unhighlightBuilding(building.id));
                polygon.addEventListener('click', () => showPopup(building));

                svg.appendChild(polygon);
            });

            container.appendChild(svg);

            // Create modal overlay (inside image container)
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'modal-overlay';
            modalOverlay.id = 'modal-overlay';
            modalOverlay.innerHTML = `
                <div class="modal-content">
                    <button class="modal-close" id="modal-close">&times;</button>
                    <div class="modal-header">
                        <h2 id="modal-title"></h2>
                        <div class="modal-breadcrumb" id="modal-breadcrumb"></div>
                    </div>
                    <div class="modal-beschreibung" id="modal-beschreibung" style="display: none;"></div>
                </div>
            `;
            container.appendChild(modalOverlay);

            wrapper.innerHTML = '';
            wrapper.appendChild(container);

            // Re-attach modal close event listener
            document.getElementById('modal-close').addEventListener('click', hidePopup);
        }

        // Render sidebar menu
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar-content');

            // Build nested group hierarchy
            const groupHierarchy = {};
            buildingsData.buildings.forEach(building => {
                const gruppe = building.gruppe || 'Sonstige';
                const parts = gruppe.split(' > ').map(p => p.trim());

                let currentLevel = groupHierarchy;
                parts.forEach((part, index) => {
                    if (!currentLevel[part]) {
                        currentLevel[part] = {
                            buildings: [],
                            subgroups: {}
                        };
                    }

                    // Add building to the deepest level only
                    if (index === parts.length - 1) {
                        currentLevel[part].buildings.push(building);
                    }

                    currentLevel = currentLevel[part].subgroups;
                });
            });

            // Helper function to sort group names
            function sortGroupNames(names) {
                return names.sort((a, b) => {
                    if (a === 'Unbekannt' || a === 'Sonstige') return 1;
                    if (b === 'Unbekannt' || b === 'Sonstige') return -1;
                    return a.localeCompare(b);
                });
            }

            // Helper function to get all building IDs from a group and its subgroups
            function getAllBuildingIds(groupData) {
                const ids = groupData.buildings.map(b => b.id);
                Object.values(groupData.subgroups).forEach(subgroup => {
                    ids.push(...getAllBuildingIds(subgroup));
                });
                return ids;
            }

            // Recursive function to render groups
            function renderGroup(groupName, groupData, level = 0) {
                const group = document.createElement('div');
                group.className = 'group';
                group.style.marginLeft = (level * 15) + 'px';

                // Collect all building IDs in this group (including subgroups)
                const buildingIds = getAllBuildingIds(groupData);

                // Group header
                const header = document.createElement('div');
                header.className = 'group-header';
                header.style.paddingLeft = (20 - level * 5) + 'px';
                header.innerHTML = `
                    <h2>${groupName}</h2>
                    <span class="group-toggle">\u25BC</span>
                `;
                header.addEventListener('click', () => {
                    group.classList.toggle('collapsed');
                });

                // Add hover listeners to highlight all buildings in group
                header.addEventListener('mouseenter', () => {
                    buildingIds.forEach(id => highlightBuilding(id));
                });
                header.addEventListener('mouseleave', () => {
                    buildingIds.forEach(id => unhighlightBuilding(id));
                });

                group.appendChild(header);

                // Container for buildings and subgroups
                const content = document.createElement('div');
                content.className = 'group-buildings';

                // Render buildings in this group
                groupData.buildings.forEach(building => {
                    const item = document.createElement('div');
                    item.className = 'building-item';
                    item.style.paddingLeft = (35 + level * 15) + 'px';
                    item.setAttribute('data-building-id', building.id);
                    item.innerHTML = `
                        <div class="building-name">${building.name}</div>
                    `;

                    // Event listeners
                    item.addEventListener('mouseenter', () => highlightBuilding(building.id));
                    item.addEventListener('mouseleave', () => unhighlightBuilding(building.id));
                    item.addEventListener('click', () => showPopup(building));

                    content.appendChild(item);
                });

                // Render subgroups recursively
                const subgroupNames = sortGroupNames(Object.keys(groupData.subgroups));
                subgroupNames.forEach(subgroupName => {
                    const subgroupElement = renderGroup(subgroupName, groupData.subgroups[subgroupName], level + 1);
                    content.appendChild(subgroupElement);
                });

                group.appendChild(content);
                return group;
            }

            // Render all top-level groups
            sidebar.innerHTML = '';
            const topLevelGroups = sortGroupNames(Object.keys(groupHierarchy));
            topLevelGroups.forEach(groupName => {
                const groupElement = renderGroup(groupName, groupHierarchy[groupName], 0);
                sidebar.appendChild(groupElement);
            });
        }

        // Highlight building
        function highlightBuilding(buildingId) {
            currentHighlighted.add(buildingId);

            // Find the building data to get its color
            const building = buildingsData.buildings.find(b => b.id === buildingId);
            const highlightColor = building?.highlightColor || '#FFC107';

            // Convert hex to rgba for semi-transparent fill
            const rgb = hexToRgb(highlightColor);
            const fillColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.35)`;
            const strokeColor = highlightColor;

            // Highlight polygon
            const polygon = document.querySelector(`.building-polygon[data-building-id="${buildingId}"]`);
            if (polygon) {
                polygon.style.fill = fillColor;
                polygon.style.stroke = strokeColor;
                polygon.style.strokeWidth = '3';
            }

            // Highlight menu item
            const menuItem = document.querySelector(`.building-item[data-building-id="${buildingId}"]`);
            if (menuItem) {
                menuItem.classList.add('highlighted');
                menuItem.style.borderLeftColor = highlightColor;
            }
        }

        // Unhighlight building
        let selectedBuildingId = null;

        function unhighlightBuilding(buildingId) {
            currentHighlighted.delete(buildingId);

            // Don't remove highlight if this building is currently selected
            if (buildingId === selectedBuildingId) return;

            // Unhighlight polygon
            const polygon = document.querySelector(`.building-polygon[data-building-id="${buildingId}"]`);
            if (polygon) {
                polygon.style.fill = 'rgba(255, 255, 0, 0)';
                polygon.style.stroke = 'rgba(255, 255, 0, 0)';
                polygon.style.strokeWidth = '2';
            }

            // Unhighlight menu item
            const menuItem = document.querySelector(`.building-item[data-building-id="${buildingId}"]`);
            if (menuItem) {
                menuItem.classList.remove('highlighted');
                menuItem.style.borderLeftColor = '';
            }
        }

        // Helper function to convert hex color to RGB
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 193, b: 7 }; // Default to amber
        }

        // Show building selection with circle and dimmed background
        function showPopup(building) {
            // First, clean up any existing selection
            hidePopup();

            // Track selected building and apply highlight
            selectedBuildingId = building.id;
            highlightBuilding(building.id);

            // Get building polygon
            const polygon = document.querySelector(`.building-polygon[data-building-id="${building.id}"]`);
            if (!polygon) return;

            // Calculate polygon center (bounding box center)
            const points = building.polygon;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            points.forEach(([x, y]) => {
                minX = Math.min(minX, x);
                maxX = Math.max(maxX, x);
                minY = Math.min(minY, y);
                maxY = Math.max(maxY, y);
            });

            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            const bWidth = maxX - minX;
            const bHeight = maxY - minY;
            const calculatedRadius = Math.max(bWidth, bHeight) / 2 * 1.8; // 80% larger than building
            const radius = Math.max(calculatedRadius, 0.04); // Minimum radius of 4% of image size

            // Get SVG
            const svg = polygon.closest('svg');
            const viewBox = svg.getAttribute('viewBox').split(' ');
            const svgWidth = parseFloat(viewBox[2]);
            const svgHeight = parseFloat(viewBox[3]);

            // Create or get defs element
            let defs = svg.querySelector('defs');
            if (!defs) {
                defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                svg.insertBefore(defs, svg.firstChild);
            }

            // Create mask
            const mask = document.createElementNS('http://www.w3.org/2000/svg', 'mask');
            mask.setAttribute('id', 'selection-mask');

            // White background (shows the dim overlay)
            const maskRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            maskRect.setAttribute('width', svgWidth);
            maskRect.setAttribute('height', svgHeight);
            maskRect.setAttribute('fill', 'white');
            mask.appendChild(maskRect);

            // Black circle (creates transparent area)
            const maskCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            maskCircle.setAttribute('cx', centerX * svgWidth);
            maskCircle.setAttribute('cy', centerY * svgHeight);
            maskCircle.setAttribute('r', radius * Math.max(svgWidth, svgHeight));
            maskCircle.setAttribute('fill', 'black');
            mask.appendChild(maskCircle);

            defs.appendChild(mask);

            // Create dimming overlay
            const dimRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            dimRect.setAttribute('class', 'dim-overlay');
            dimRect.setAttribute('width', svgWidth);
            dimRect.setAttribute('height', svgHeight);
            dimRect.setAttribute('mask', 'url(#selection-mask)');
            svg.appendChild(dimRect);

            // Add selection circle
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('class', 'selection-circle');
            circle.setAttribute('cx', centerX * svgWidth);
            circle.setAttribute('cy', centerY * svgHeight);
            circle.setAttribute('r', radius * Math.max(svgWidth, svgHeight));
            svg.appendChild(circle);

            // Show modal with building info
            const modal = document.getElementById('modal-overlay');
            const modalContent = document.querySelector('.modal-content');

            // Populate modal content
            document.getElementById('modal-title').textContent = building.name;

            // Build breadcrumb from gruppe
            const breadcrumb = document.getElementById('modal-breadcrumb');
            const gruppe = (building.gruppe || '').trim();
            if (gruppe) {
                const parts = gruppe.split(/\s*>\s*/);
                breadcrumb.innerHTML = parts.map(p => `<span>${p}</span>`).join('');
                breadcrumb.style.display = 'block';
            } else {
                breadcrumb.style.display = 'none';
            }

            const beschreibungEl = document.getElementById('modal-beschreibung');
            if (building.beschreibung && building.beschreibung.trim()) {
                beschreibungEl.innerHTML = building.beschreibung;
                beschreibungEl.style.display = 'block';
            } else {
                beschreibungEl.style.display = 'none';
            }

            // Show modal
            modal.classList.add('active');

            // Position modal close to the circle
            requestAnimationFrame(() => {
                const imageContainer = document.querySelector('.image-container');
                if (!imageContainer) return;

                const img = imageContainer.querySelector('img');
                const imgWidth = img.offsetWidth;
                const imgHeight = img.offsetHeight;
                const modalRect = modalContent.getBoundingClientRect();

                // Calculate building position relative to the image (in pixels)
                const buildingX = centerX * imgWidth;
                const buildingY = centerY * imgHeight;

                // Calculate circle radius in pixels
                const circleRadiusPx = radius * Math.max(imgWidth, imgHeight);

                const gap = 20; // Gap between circle and modal
                const margin = 15; // Margin from image edges
                let left, top;

                // Determine which half of the image the circle is in
                const isOnRightHalf = centerX > 0.5;

                // Calculate the circle's left and right edges
                const circleLeftEdge = buildingX - circleRadiusPx;
                const circleRightEdge = buildingX + circleRadiusPx;

                // Position modal on opposite side of the image from the circle
                if (isOnRightHalf) {
                    // Circle is on right, place modal on left (to the left of circle's left edge)
                    const targetLeft = circleLeftEdge - gap - modalRect.width;
                    if (targetLeft >= margin) {
                        // Fits on left side - center vertically on circle
                        left = targetLeft;
                        top = buildingY - (modalRect.height / 2);
                    } else {
                        // Not enough room on left, try below
                        left = buildingX - (modalRect.width / 2);
                        top = buildingY + circleRadiusPx + gap;
                    }
                } else {
                    // Circle is on left, place modal on right (to the right of circle's right edge)
                    const targetLeft = circleRightEdge + gap;
                    if (targetLeft + modalRect.width <= imgWidth - margin) {
                        // Fits on right side - center vertically on circle
                        left = targetLeft;
                        top = buildingY - (modalRect.height / 2);
                    } else {
                        // Not enough room on right, try below
                        left = buildingX - (modalRect.width / 2);
                        top = buildingY + circleRadiusPx + gap;
                    }
                }

                // If positioned below and it doesn't fit, try above
                if (left === buildingX - (modalRect.width / 2) && top !== undefined) {
                    if (top + modalRect.height > imgHeight - margin) {
                        const topAbove = buildingY - circleRadiusPx - gap - modalRect.height;
                        if (topAbove >= margin) {
                            top = topAbove;
                        }
                    }
                }

                // Ensure modal stays within bounds
                left = Math.max(margin, Math.min(left, imgWidth - modalRect.width - margin));
                top = Math.max(margin, Math.min(top, imgHeight - modalRect.height - margin));

                modalContent.style.left = left + 'px';
                modalContent.style.top = top + 'px';
            });
        }

        // Hide selection
        function hidePopup() {
            // Clear selected building highlight
            if (selectedBuildingId) {
                const prev = selectedBuildingId;
                selectedBuildingId = null;
                unhighlightBuilding(prev);
            }

            // Remove selection elements
            const circle = document.querySelector('.selection-circle');
            const dimOverlay = document.querySelector('.dim-overlay');
            const mask = document.getElementById('selection-mask');
            const modal = document.getElementById('modal-overlay');

            if (circle) circle.remove();
            if (dimOverlay) dimOverlay.remove();
            if (mask) mask.remove();
            if (modal) modal.classList.remove('active');
        }

        // Keyboard shortcut to close selection
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hidePopup();
            }
        });

        // Click anywhere on map to close selection (but not on modal)
        document.addEventListener('click', (e) => {
            // Only close if clicking outside buildings, sidebar, and modal
            if (!e.target.closest('.building-polygon') &&
                !e.target.closest('.building-item') &&
                !e.target.closest('.sidebar') &&
                !e.target.closest('.modal-content')) {
                hidePopup();
            }
        });

        // Initialize on page load
        init();
    </script>
</body>
</html>
